name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronized]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: ${{ github.event.issue.pull_request || github.event.pull_request }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: PR Agent action
        uses: Codium-ai/pr-agent@main
        env:
          CONFIG.MODEL: "gemini/gemini-3-pro-preview"
          CONFIG.FALLBACK_MODELS: "['gemini/gemini-1.5-pro']"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LITELLM_PARAMS: "reasoning_effort=high,temperature=1.0"
          PR_DESCRIPTION.PUBLISH_DESCRIPTION_AS_COMMENT: "true"
          PR_REVIEW.REQUIRE_SCORE_REVIEW: "false"
